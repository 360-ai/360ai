<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seite nicht gefunden – Del Sud Frankenberg</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    @font-face{font-family:'Cormorant Garamond';font-style:normal;font-weight:700;font-display:swap;src:url('fonts/cormorant-garamond-700.ttf') format('truetype');}
    @font-face{font-family:'Mulish';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/mulish-400.ttf') format('truetype');}
    @font-face{font-family:'Mulish';font-style:normal;font-weight:700;font-display:swap;src:url('fonts/mulish-700.ttf') format('truetype');}
    :root{--burg:#3D1010;--gold:#C9963A;--gold-lt:#E8BF7A;--cream:#FAF6EE;--text:#1A0F0A;--muted:#6B5040;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Mulish','Trebuchet MS',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    .topbar{background:var(--burg);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:10px;}
    .topbar a{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;}
    .topbar img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold);}
    .topbar span{font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;font-size:1.2rem;letter-spacing:0.08em;}
    .content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px;}
    .code{font-family:'Cormorant Garamond',Georgia,serif;font-size:6rem;font-weight:700;color:var(--burg);line-height:1;margin-bottom:8px;}
    h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.6rem;color:var(--burg);margin-bottom:16px;}
    p{color:var(--muted);margin-bottom:28px;max-width:420px;}
    .links{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
    .links a{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:50px;font-weight:700;font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;transition:0.35s ease;}
    .btn-gold{background:var(--gold);color:#fff;}
    .btn-gold:hover{background:var(--burg);transform:translateY(-2px);}
    .btn-ghost{background:transparent;color:var(--burg);border:1.5px solid var(--gold);}
    .btn-ghost:hover{background:rgba(61,16,16,0.06);}
    footer{padding:20px 24px;text-align:center;font-size:0.72rem;color:var(--muted);}
    footer a{color:var(--gold);text-decoration:none;}
  </style>
</head>
<body>
  <header class="topbar">
    <a href="index.html">
      <img src="images/site-embed-01.jpg" alt="" width="36" height="36" />
      <span>DEL SUD</span>
    </a>
  </header>
  <main class="content">
    <div class="code">404</div>
    <h1>Seite nicht gefunden</h1>
    <p>Die angeforderte Seite existiert nicht oder wurde verschoben. Besuchen Sie unsere Startseite oder werfen Sie einen Blick auf die Speisekarte.</p>
    <div class="links">
      <a class="btn-gold" href="index.html">Zur Startseite</a>
      <a class="btn-ghost" href="speisekarte.html">Speisekarte</a>
    </div>
  </main>
  <footer>
    © 2026 Del Sud · <a href="impressum.html">Impressum</a> · <a href="datenschutz.html">Datenschutz</a>
  </footer>
</body>
</html>
