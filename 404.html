<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seite nicht gefunden – 360ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root { --primary-dark: #0d1212; --accent: #00BFA6; --text: #1a1a2e; --text-muted: #6b7080; --font-display: 'Playfair Display', Georgia, serif; --font-body: 'Outfit', sans-serif; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--primary-dark); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .container { max-width: 480px; }
    h1 { font-family: var(--font-display); font-size: 72px; color: var(--accent); margin-bottom: 16px; }
    p { color: rgba(255,255,255,0.8); margin-bottom: 28px; line-height: 1.6; }
    a { display: inline-block; padding: 14px 32px; background: var(--accent); color: #fff; border-radius: 8px; font-weight: 700; text-decoration: none; transition: 0.3s; }
    a:hover { background: #33D9C7; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Die angeforderte Seite wurde nicht gefunden.</p>
    <a href="index.html">Zur Startseite</a>
  </div>
</body>
</html>
