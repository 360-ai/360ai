<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seite nicht gefunden – 360ai</title>
  <meta name="robots" content="noindex,follow" />
  <style>
    :root {
      --lavender:        #7B8CB6;
      --steel:           #97B9C1;
      --mint:            #84C1BC;
      --gradient:        linear-gradient(90deg, #7B8CB6, #84C1BC);
      --gradient-135:    linear-gradient(135deg, #7B8CB6, #97B9C1, #84C1BC);
      --gradient-text:   linear-gradient(90deg, #7B8CB6, #84C1BC);
      --accent-dim:      rgba(123,140,182,0.10);
      --accent-glow:     rgba(123,140,182,0.20);
      --accent-border:   rgba(123,140,182,0.25);
      --mint-dim:        rgba(132,193,188,0.10);
      --mint-glow:       rgba(132,193,188,0.20);
      --dark:            #1a1d35;
      --dark-2:          #232842;
      --dark-3:          #1e2240;
      --bg:              #F9F9F9;
      --bg-soft:         #F0F3FA;
      --bg-card:         #FFFFFF;
      --border:          #E4E8F0;
      --font:            'Outfit', 'Montserrat', 'Trebuchet MS', sans-serif;
      --font-display:    'Outfit', 'Montserrat', 'Trebuchet MS', sans-serif;
      --font-body:       'Outfit', 'Montserrat', 'Trebuchet MS', sans-serif;
      --text:            #1a1a2e;
      --text-muted:      #6b7080;
      --text-light:      rgba(255,255,255,0.88);
      --text-faint:      rgba(255,255,255,0.45);
      --text-xs: 9px; --text-sm: 11px; --text-base: 13px; --text-md: 16px;
      --text-lg: 22px; --text-xl: 28px; --text-2xl: 34px; --text-3xl: 42px;
      --radius: 8px; --radius-lg: 12px; --radius-xl: 16px; --radius-pill: 50px;
      --shadow: 0 8px 40px rgba(0,0,0,0.08);
      --shadow-lg: 0 20px 80px rgba(0,0,0,0.14);
      --shadow-brand: 0 4px 20px rgba(123,140,182,0.25);
      --ease: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--dark); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .container { max-width: 480px; }
    h1 { font-family: var(--font-display); font-size: 72px; color: var(--lavender); margin-bottom: 16px; }
    p { color: rgba(255,255,255,0.8); margin-bottom: 28px; line-height: 1.6; }
    a { display: inline-block; padding: 14px 32px; background: var(--lavender); color: #fff; border-radius: 8px; font-weight: 700; text-decoration: none; transition: 0.3s; }
    a:hover { background: var(--mint); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Die angeforderte Seite wurde nicht gefunden.</p>
    <a href="index.html">Zur Startseite</a>
  </div>
</body>
</html>
